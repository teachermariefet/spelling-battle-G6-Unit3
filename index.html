<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spelling Battle - Tap Mode</title>
    <link href="https://fonts.googleapis.com/css2?family=Balsamiq+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --team-a: #ff4757;
            --team-b: #2e86de;
        }

        body, html {
            margin: 0; padding: 0; height: 100%; overflow: hidden;
            font-family: 'Balsamiq Sans', cursive;
            touch-action: manipulation;
        }

        #start-page {
            position: absolute; width: 100%; height: 100%;
            background: #f1c40f;
            display: flex; flex-direction: column; align-items: center; 
            justify-content: center; 
            z-index: 100;
        }

        .ui-overlay {
            display: flex; flex-direction: column; gap: 20px; align-items: center;
            background: rgba(255, 255, 255, 0.9);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 10px 0 rgba(0,0,0,0.1);
        }

        #music-toggle {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            z-index: 300; padding: 10px 25px; font-size: 18px;
            font-family: 'Balsamiq Sans', cursive; font-weight: bold;
            background: white; border: 3px solid #333; border-radius: 50px;
            cursor: pointer; box-shadow: 0 4px 0 #333;
        }

        #play-btn {
            padding: 25px 80px; font-size: 40px; cursor: pointer; background: #2ecc71; color: white;
            border: 5px solid #fff; border-radius: 20px; font-family: 'Balsamiq Sans', cursive;
            font-weight: bold; box-shadow: 0 10px 0 #27ae60; transition: 0.1s;
        }
        #play-btn:active { transform: translateY(4px); box-shadow: 0 6px 0 #27ae60; }

        #edit-modal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; padding: 30px; border-radius: 20px; border: 5px solid #333; z-index: 400;
        }

        #game-container { display: none; height: 100%; width: 100%; flex-direction: row; position: relative; }

        .side { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: space-around; padding: 20px; transition: background 0.3s; }
        #side-a { background: #fff0f0; border-right: 4px dashed #ccc; }
        #side-b { background: #f0faff; }

        .score-display { font-size: 40px; font-weight: bold; }
        .side-a-text { color: var(--team-a); }
        .side-b-text { color: var(--team-b); }

        .vocab-img { 
            width: 280px; height: 200px; object-fit: contain; border-radius: 20px; 
            border: 8px solid #333; background: #fff;
        }

        .boxes-container, .letters-container { display: flex; gap: 10px; justify-content: center; min-height: 80px; flex-wrap: wrap; }
        .box { width: 65px; height: 65px; border: 4px dashed #aaa; border-radius: 12px; background: rgba(255,255,255,0.7); display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: bold; color: #333; }
        .box.filled { border: 4px solid #27ae60; background: #e8f8f0; border-style: solid; }

        .letter { 
            width: 70px; height: 70px; background: white; border: 4px solid #333; border-radius: 12px; 
            display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: bold; 
            cursor: pointer; box-shadow: 0 6px 0 #333; user-select: none; transition: transform 0.1s, background 0.2s;
        }
        .letter:active { transform: translateY(4px); box-shadow: 0 2px 0 #333; }
        .letter.wrong { background: #ff4757 !important; color: white; }

        #timer-bomb { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); width: 100px; height: 100px; background: #222; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; border: 6px solid #ff4757; z-index: 10; }
        #timer-bomb span { font-size: 35px; font-weight: bold; }

        #results-screen {
            display: none; position: absolute; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); z-index: 500; color: white; 
            flex-direction: column; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

    <button id="music-toggle">🎵 Music: ON</button>

    <div id="start-page">
        <div class="ui-overlay">
            <h1 style="margin-top:0; color:#333;">SPELLING BATTLE</h1>
            <button id="play-btn">START</button>
            <button id="edit-btn" style="background:none; border:none; color:#666; cursor:pointer; text-decoration:underline;">Edit Words</button>
        </div>
    </div>

    <div id="edit-modal">
        <h3>Vocabulary List (comma separated)</h3>
        <textarea id="vocab-input" style="width:300px; height:100px;">coat, dress, hat, jacket, skirt, shirt, jeans, pants, shorts</textarea>
        <br><br>
        <button onclick="closeEdit()" style="padding:10px 20px;">SAVE</button>
    </div>

    <div id="game-container">
        <div class="side" id="side-a">
            <div class="score-display side-a-text">TEAM A: <span id="score-a">0</span></div>
            <img id="img-a" class="vocab-img" src="" alt="Word">
            <div id="boxes-a" class="boxes-container"></div>
            <div id="letters-a" class="letters-container"></div>
        </div>

        <div id="timer-bomb"><span id="timer-val">120</span></div>

        <div class="side" id="side-b">
            <div class="score-display side-b-text">TEAM B: <span id="score-b">0</span></div>
            <img id="img-b" class="vocab-img" src="" alt="Word">
            <div id="boxes-b" class="boxes-container"></div>
            <div id="letters-b" class="letters-container"></div>
        </div>
    </div>

    <div id="results-screen">
        <h1 id="winner-msg">TEAM A WINS!</h1>
        <h2 id="score-summary"></h2>
        <button onclick="location.reload()" style="padding:15px 40px; font-size:20px; cursor:pointer; border-radius:10px;">PLAY AGAIN</button>
    </div>

    <audio id="bg-music" src="background music.mp3" loop></audio>

    <script>
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        let audioCtx;
        const bgMusic = document.getElementById('bg-music');
        const musicBtn = document.getElementById('music-toggle');
        let musicOn = true;

        const Sounds = {
            play(freq, type, duration, vol = 0.1) {
                if(!audioCtx) return;
                const o = audioCtx.createOscillator();
                const g = audioCtx.createGain();
                o.type = type;
                o.frequency.setValueAtTime(freq, audioCtx.currentTime);
                g.gain.setValueAtTime(vol, audioCtx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
                o.connect(g);
                g.connect(audioCtx.destination);
                o.start();
                o.stop(audioCtx.currentTime + duration);
            },
            chime() { 
                this.play(880, 'sine', 0.5); 
                setTimeout(() => this.play(1109, 'sine', 0.5), 100);
            },
            buzz() { 
                this.play(100, 'sawtooth', 0.4, 0.2); 
            }
        };

        let words = [];
        let gameState = {
            a: { score: 0, wordIndex: 0, currentWord: '', progress: 0 },
            b: { score: 0, wordIndex: 0, currentWord: '', progress: 0 }
        };
        let timeLeft = 120, gameActive = false;

        musicBtn.onclick = () => {
            musicOn = !musicOn;
            musicBtn.innerText = musicOn ? "🎵 Music: ON" : "🎵 Music: OFF";
            musicOn ? bgMusic.play() : bgMusic.pause();
        };

        document.getElementById('edit-btn').onclick = () => document.getElementById('edit-modal').style.display = 'block';
        function closeEdit() { document.getElementById('edit-modal').style.display = 'none'; }
        
        document.getElementById('play-btn').onclick = () => {
            if (!audioCtx) audioCtx = new AudioCtx();
            if (musicOn) bgMusic.play().catch(() => {});
            startGame();
        };

        function startGame() {
            const input = document.getElementById('vocab-input').value;
            words = input.split(',').map(w => w.trim().toUpperCase()).filter(w => w !== "");
            
            document.getElementById('start-page').style.display = 'none';
            document.getElementById('game-container').style.display = 'flex';
            
            gameActive = true;
            setupRound('a');
            setupRound('b');
            startTimer();
        }

        function setupRound(side) {
            const state = gameState[side];
            state.currentWord = words[state.wordIndex];
            state.progress = 0;

            document.getElementById(`img-${side}`).src = `${state.currentWord.toLowerCase()}.jpg`;
            
            // Create target boxes
            const boxesCont = document.getElementById(`boxes-${side}`);
            boxesCont.innerHTML = '';
            for (let i = 0; i < state.currentWord.length; i++) {
                const box = document.createElement('div');
                box.className = 'box';
                box.id = `box-${side}-${i}`;
                boxesCont.appendChild(box);
            }

            // Create scrambled letters
            const lettersCont = document.getElementById(`letters-${side}`);
            lettersCont.innerHTML = '';
            const scrambled = state.currentWord.split('').sort(() => Math.random() - 0.5);
            
            scrambled.forEach(char => {
                const btn = document.createElement('div');
                btn.className = 'letter';
                btn.textContent = char;
                btn.onclick = () => handleTap(side, char, btn);
                lettersCont.appendChild(btn);
            });
        }

        function handleTap(side, char, btnElement) {
            if (!gameActive) return;

            const state = gameState[side];
            const expectedChar = state.currentWord[state.progress];

            if (char === expectedChar) {
                // Correct
                const targetBox = document.getElementById(`box-${side}-${state.progress}`);
                targetBox.textContent = char;
                targetBox.classList.add('filled');
                
                // Hide the used letter button
                btnElement.style.visibility = 'hidden';
                
                state.progress++;
                Sounds.chime();

                if (state.progress === state.currentWord.length) {
                    completeWord(side);
                }
            } else {
                // Wrong
                Sounds.buzz();
                btnElement.classList.add('wrong');
                setTimeout(() => btnElement.classList.remove('wrong'), 300);
            }
        }

        function completeWord(side) {
            gameState[side].score++;
            document.getElementById(`score-${side}`).innerText = gameState[side].score;
            
            // Next word logic
            gameState[side].wordIndex = (gameState[side].wordIndex + 1) % words.length;
            
            setTimeout(() => {
                if (gameActive) setupRound(side);
            }, 600);
        }

        function startTimer() {
            const timer = setInterval(() => {
                if (!gameActive) { clearInterval(timer); return; }
                timeLeft--;
                document.getElementById('timer-val').innerText = timeLeft;
                if (timeLeft <= 0) { clearInterval(timer); showResults(); }
            }, 1000);
        }

        function showResults() {
            gameActive = false;
            document.getElementById('game-container').style.display = 'none';
            const screen = document.getElementById('results-screen');
            screen.style.display = 'flex';
            
            const sA = gameState.a.score;
            const sB = gameState.b.score;
            
            let msg = "IT'S A DRAW!";
            if (sA > sB) msg = "TEAM A WINS!";
            if (sB > sA) msg = "TEAM B WINS!";
            
            document.getElementById('winner-msg').innerText = msg;
            document.getElementById('score-summary').innerText = `TEAM A: ${sA} | TEAM B: ${sB}`;
        }
    </script>
</body>
</html>
